defaults:
  - dataset@training_data: real_2023-04-12
  - dataset@test_data: experiments_2023-04-17
  - model: transformer
  - loss: logit_merged
  - metrics@train_metrics: finetune_train
  - metrics@eval_metrics: finetune_eval
  - _self_
  - fine_tune_default: ${model}
  - optional pretrained_model: ${model}_${fine_tune_experiment}
  # the experiment itself is last so it can e.g. unset pretrained model for `no_pretraining`
  - fine_tune_experiment: null

# must be overridden by fine_tune_default or pretrained_model config
model_artifact: ???

trainable_layers:
  mlp_head: train  # ( freeze | train | reinit )
  n_final_up_layers: 3
  final_up_layers: train  # ( freeze | train | reinit )
split_ratio: 0.8

learning_rate: 0.00025
scheduler:
  lr_epoch_base: 0.98
class_weights: null  # weights according to label frequency in dataset
batch_size: 8
test_batch_size: 8
epochs: 50
log_every_n_updates: 2
test_every_n_epochs: 5
save_every_n_epochs: 10
num_workers: 8
device: null

wandb:
  tags: ["default"]
  notes: null
  name: default

# overrides
model:
  n_classes: 7 # bit of a hack, sorry
