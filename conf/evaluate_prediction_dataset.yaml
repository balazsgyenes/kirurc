defaults:
  - dataset@test_data: predictions_2023-04-17
  - metrics: finetune_eval
  - open3d_draw: default
  - color_mapping: debugging
  - _self_

batch_size: 8
num_workers: 0

test_data:
  augmentation: null  # disable augmentation to see performance on unnoised data
  # debug_transforms: True  # enable this to bypass preprocessed data

# start at some index (if integer) or some fraction of the way through dataset (if float)
# start_at: 0.5

# keep predicted splines/skeletons so they can be saved/rendered
metrics:
  spline:
    cleanup_skeletons: True
    cleanup_splines: False

